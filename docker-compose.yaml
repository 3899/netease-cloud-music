services:
  ncmctl:
    image: ${IMAGES}
    # data目录可以根据情况自行更改
    volumes:
      - "./data:/root/"
      # 如需显式启用playids，可额外挂载歌曲ID文件：
      # - "./song_ids.txt:/root/song_ids.txt:ro"
    # 默认运行刷歌和云贝签到定时任务,如想运行音乐合伙人则追加"--partner"
    # 如需显式启用playids，可改为:
    # command: [ "/app/ncmctl", "task", "--sign", "--playids", "--playids.ids-file", "/root/song_ids.txt" ]
    command: [ "/app/ncmctl", "task","--scrobble","--sign" ]
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "3"
