name: deploy ghcr image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag, e.g. latest or v1.0.0"
        required: true
        default: "latest"

jobs:
  push-ghcr:
    name: Push Docker image to GHCR
    if: ${{ github.repository == '3899/netease-cloud-music' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Set environment variables
        run: |
          echo "BUILD_TIME=$(date --rfc-3339=seconds --utc)" >> $GITHUB_ENV
          echo "VERSION=${{ inputs.image_tag }}" >> $GITHUB_ENV
          echo "COMMIT_HASH=$(echo "${{ github.sha }}" | cut -c 1-7)" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        id: bp
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_TIME=${{ env.BUILD_TIME }}
            VERSION=${{ env.VERSION }}
            COMMIT_HASH=${{ env.COMMIT_HASH }}
            GOPROXY=https://proxy.golang.org

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.bp.outputs.digest }}
          push-to-registry: true

      - name: Show image summary
        run: |
          {
            echo "## GHCR 镜像已推送"
            echo
            echo "- 镜像地址: \`${IMAGE_NAME}:${{ inputs.image_tag }}\`"
            echo "- 提交短哈希标签: \`${IMAGE_NAME}:sha-${COMMIT_HASH}\`"
            echo "- Digest: \`${{ steps.bp.outputs.digest }}\`"
            echo
            echo "拉取命令:"
            echo '```bash'
            echo "docker pull ${IMAGE_NAME}:${{ inputs.image_tag }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
