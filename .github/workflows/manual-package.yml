name: manual-package

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, e.g. v0.0.0-manual.1"
        required: true
        default: "v0.0.0-manual.1"
      release_name:
        description: "Release name shown on GitHub Releases"
        required: true
        default: "Manual package build"
      prerelease:
        description: "Create as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  package:
    if: ${{ github.repository == '3899/netease-cloud-music' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go environment
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Set build env
        run: |
          echo "BUILD_TIME=$(date --rfc-3339=seconds --utc)" >> "$GITHUB_ENV"
          echo "COMMIT_HASH=$(echo "${{ github.sha }}" | cut -c 1-7)" >> "$GITHUB_ENV"
          echo "VERSION=${{ inputs.release_tag }}" >> "$GITHUB_ENV"

      - name: Prepare release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## ✨ 变化特性

          - **增强 `playids` 仿真度**：基于 Android 逆向实现三阶段 WebLog 上报 (`startplay`/`play-begin`/`play-complete`)。
          - **迁移至 EAPI 协议**：使用 Android 客户端原生接口获取播放 URL，全面模拟客户端网络行为。
          - **真实设备指纹**：内置 50 款主流安卓机型库，支持按 UID 持久化隔离，确保账号设备身份唯一且稳定。
          - **独立的每日上限**：`playids` 拥有独立的每日播放计数 (不再与 `scrobble` 共享)，支持自定义区间并每日随机化目标。
          - **CDN 音频缓存**：支持单次任务内音频流复用，减少 CDN 异常流量，并精准上报 `download` 缓存标记。
          - **精细化中文日志**：新增设备指纹详情、三阶段上报明细、CDN/缓存来源及播放结束类型显示。
          - **发布包优化**：发布矩阵精简为 `windows/amd64`、`linux/amd64`、`linux/arm64`、`linux/armv6`。
          EOF

      - name: Build packages
        run: |
          set -euo pipefail

          mkdir -p dist/manual

          build_one() {
            local goos="$1"
            local goarch="$2"
            local goarm="${3:-}"
            local ext=""
            local binary="ncmctl"
            local dir_name="${goos}_${goarch}"
            local archive=""
            local target_dir="dist/manual/${dir_name}"

            if [ -n "${goarm}" ]; then
              dir_name="${goos}_${goarch}v${goarm}"
              target_dir="dist/manual/${dir_name}"
            fi

            mkdir -p "${target_dir}"

            if [ "${goos}" = "windows" ]; then
              ext=".exe"
              binary="ncmctl.exe"
              archive="dist/manual/ncmctl_${goos}_${goarch}.zip"
            elif [ -n "${goarm}" ]; then
              archive="dist/manual/ncmctl_${goos}_${goarch}v${goarm}.tar.gz"
            else
              archive="dist/manual/ncmctl_${goos}_${goarch}.tar.gz"
            fi

            cp README.md LICENSE "${target_dir}/"

            env CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" GOARM="${goarm}" \
              go build \
              -tags timetzdata \
              -ldflags "-s -w -X 'main.Version=${VERSION}' -X 'main.Commit=${COMMIT_HASH}' -X 'main.BuildTime=${BUILD_TIME}'" \
              -o "${target_dir}/${binary}" \
              ./cmd/ncmctl

            if [ "${goos}" = "windows" ]; then
              (
                cd "${target_dir}"
                zip -9 -r "../$(basename "${archive}")" .
              )
            else
              tar -C "${target_dir}" -czf "${archive}" .
            fi
          }

          build_one windows amd64
          build_one linux amd64
          build_one linux arm64
          build_one linux arm 6

      - name: List generated packages
        run: |
          ls -lah dist/manual

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.release_tag }}-packages
          path: |
            dist/manual/*.zip
            dist/manual/*.tar.gz
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          files: |
            dist/manual/*.zip
            dist/manual/*.tar.gz
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
